name: Atualizar dados do dashboard

on:
  schedule:
    - cron: "0 * * * *"   # a cada hora
  workflow_dispatch:       # permite rodar manualmente na aba Actions
  issues:
    types: [opened, closed, reopened, labeled, unlabeled]

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buscar dados dos Projects
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const query = `
              query($login: String!) {
                user(login: $login) {
                  projectsV2(first: 10) {
                    nodes {
                      title
                      number
                      closed
                      items(first: 100) {
                        nodes {
                          fieldValueByName(name: "Status") {
                            ... on ProjectV2ItemFieldSingleSelectValue { name }
                          }
                          content {
                            ... on Issue {
                              title
                              number
                              state
                              url
                              createdAt
                              closedAt
                            }
                            ... on PullRequest {
                              title
                              number
                              state
                              url
                              createdAt
                            }
                            ... on DraftIssue {
                              title
                              createdAt
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const resultado = await github.graphql(query, { login: "deffmain" });

            const quadros = resultado.user.projectsV2.nodes
              .filter(projeto => !projeto.closed)
              .map(projeto => ({
                titulo: projeto.title,
                numero: projeto.number,
                itens: projeto.items.nodes
                  .filter(item => item.content)
                  .map(item => ({
                    titulo: item.content.title,
                    numero: item.content.number ?? null,
                    url: item.content.url ?? null,
                    status: item.fieldValueByName?.name ?? "Sem status",
                    estado: item.content.state ?? null,
                    criadaEm: item.content.createdAt ?? null
                  }))
              }));

            const dados = {
              atualizadoEm: new Date().toISOString(),
              quadros
            };

            require("fs").writeFileSync("data.json", JSON.stringify(dados, null, 2));
            console.log(`Quadros encontrados: ${quadros.map(q => q.titulo).join(", ") || "nenhum"}`);

      - name: Commitar data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Atualiza dados do dashboard"
          git push
